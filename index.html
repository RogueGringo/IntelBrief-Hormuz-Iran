<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Topological motion intelligence platform — capture, encode, and analyze motion patterns from STEVAL-PROTEUS1 IMU sensor." />
    <meta name="theme-color" content="#0a0c10" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%230a0c10' stroke='%23d4a843' stroke-width='2'/><circle cx='16' cy='16' r='6' fill='none' stroke='%23d4a843' stroke-width='1.5'/><circle cx='16' cy='10' r='2' fill='%23d4a843'/></svg>" />
    <title>Sovereign Motion — Topological Motion Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0c10; font-family: 'DM Sans', -apple-system, sans-serif; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #12151c; }
      ::-webkit-scrollbar-thumb { background: #2a2e3a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3e4a; }
      ::selection { background: #d4a84340; color: #e8e4dc; }
      @media (max-width: 768px) {
        .tab-bar { flex-wrap: wrap !important; }
        .tab-bar button { flex: 1 1 auto !important; min-width: 80px !important; padding: 8px 10px !important; font-size: 9px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
