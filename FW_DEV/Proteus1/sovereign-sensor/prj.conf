# Sovereign Sensor — Phase 1 Configuration
# Target: STEVAL-PROTEUS1 (STM32WB55)

# Kernel
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Sensor subsystem
CONFIG_SENSOR=y
CONFIG_ISM330DHCX=y
CONFIG_ISM330DHCX_TRIGGER_GLOBAL_THREAD=y

# I2C (ISM330DHCX on STEVAL-PROTEUS1 uses I2C)
CONFIG_I2C=y

# USB CDC ACM (serial over USB)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_PRODUCT="Sovereign Sensor"
CONFIG_USB_DEVICE_MANUFACTURER="IntelAction"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740

# Console over USB
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=2048

# Floating point
CONFIG_FPU=y

# Thread awareness
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# Power management (Phase 1: basic)
CONFIG_PM=y
