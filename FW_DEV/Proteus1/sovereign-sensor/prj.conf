# Sovereign Sensor — Phase 1 Configuration
# Target: STEVAL-PROTEUS1 (STM32WB55)

# Kernel
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Sensor subsystem
CONFIG_SENSOR=y
CONFIG_ISM330DHCX=y
CONFIG_ISM330DHCX_TRIGGER_NONE=y
# IIS3DWB: no Zephyr driver — using raw SPI in impact_detect.c
CONFIG_IIS2DLPC=y
CONFIG_IIS2DLPC_TRIGGER_NONE=y
CONFIG_STTS22H=y

# SPI + I2C (sensors on both buses)
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_GPIO=y

# USB CDC ACM (serial over USB)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_PRODUCT="Sovereign Sensor"
CONFIG_USB_DEVICE_MANUFACTURER="IntelAction"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740

# Console via UART (visible on STLINK VCP if wired)
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=2048

# Floating point
CONFIG_FPU=y

# Use newlib (avoids picolibc lock type conflict with SDK 0.17.4)
CONFIG_NEWLIB_LIBC=y

# Thread awareness
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# Power management DISABLED for Phase 1 (PM disables SWD debug port)
CONFIG_PM=n

# Keep SWD debug active
CONFIG_DEBUG=y

# External flash (MX25R6435F on QuadSPI) — disabled until custom pinctrl
# CONFIG_FLASH=y
# CONFIG_FLASH_MAP=y
# CONFIG_FLASH_PAGE_LAYOUT=y

# Bluetooth LE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SovereignSensor"
CONFIG_BT_DEVICE_APPEARANCE=833
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_GATT_DYNAMIC_DB=y
