version: "3.8"

services:
  sovereign-motion:
    build: .
    ports:
      - "${PORT:-8000}:7860"
    environment:
      - SOVEREIGN_API_KEY=${SOVEREIGN_API_KEY:-}
    volumes:
      - motion-data:/home/user/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  motion-data:
    driver: local
